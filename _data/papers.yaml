          real-time patient positioning and beam orientation selection in intensity-modulated
          radiation therapy (IMRT). Contributions include continuum robot modeling via Cosserat
          rod theory, neuro-adaptive control for 6-DOF pose correction, deep reinforcement
          learning for beam angle optimization, and clinical validation on a CyberKnife platform.

