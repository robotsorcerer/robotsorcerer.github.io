        paper_status: Accepted
        year: May 2022
        thumbnail: /assets/thumbs/igl.jpg
        abstract: >
          We extend interaction-grounded learning (IGL) to settings where actions affect
          the feedback signal itself. By incorporating action-inclusive feedback into the IGL
          framework, we derive provably efficient algorithms for learning reward-free
          representations and policies in partially observable environments, with
          applications to healthcare decision support.

