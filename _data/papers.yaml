        venue: American Control Conference (ACC), Toronto, ON
        paper_status: Accepted
        year: May 2024
        thumbnail: /assets/thumbs/vecnn.jpg
        abstract: >
          We propose a counterexample-guided training procedure for neural network barrier
          functions that incorporates a formal verifier in the training loop. The algorithm
          terminates with a certificate of correctness and significantly reduces the barrier
          function training time compared to purely adversarial approaches.

  - items: 'PCLAST'
    paperitems:
      - title: 'PCLAST: Discovering Plannable Continuous Latent States'
        location: 'https://arxiv.org/abs/2311.03534'
        authors:
          - Anurag Koul, Shivakanth Sujit, <a href="https://shaoruchen.github.io">Shaoru Chen</a>, Ben Evans, Lili Wu, <b>Lekan Molu</b>,
            Byron Xu, Rajan Chari, Riashat Islam, Raihan Seraj, Yonathan Efroni, Miroslav Dudík, John Langford, Alex Lamb
        venue_web: 'https://iclr.cc/'
        venue: International Conference on Learning Representations (ICLR)
        paper_status: Accepted
        year: September 2023
        thumbnail: /assets/thumbs/pclast.jpg
        abstract: >
          PCLAST learns a continuous latent state space from high-dimensional observations
          in which planning with simple interpolation is provably correct. By optimizing for
          topological planability rather than reconstruction fidelity, the learned
          representations support reliable goal-conditioned planning in complex visual
          environments without environment-specific reward engineering.

  - items: 'MixedH2IFAC'
    paperitems:
      - title: 'Mixed H2/H-Infinity Policy Learning Synthesis'
        location: /downloads/Papers/ifac.pdf
        authors:
          - <b>Lekan Molu</b>.
        venue_web: https://www.ifac2023.org/archives/001/202209/IFAC2023_2ndCFP_20220921_1.pdf
        venue: 'World Congress, International Federation of Automatic Control, Yokohama, Japan'
        paper_status: Accepted
        year: July 2023
        thumbnail: /assets/thumbs/ifac.jpg
        abstract: >
          We formulate and solve a continuous-time mixed H2/H-infinity reinforcement learning
          problem for output-feedback control synthesis without a known system model.
          The algorithm iterates policy evaluation and improvement steps on data collected
          from the system, converging to an optimal robust policy under disturbance attenuation
          constraints.

  - items: 'MixedH2'
    paperitems:
      - title: 'Robust Policy Optimization in Continuous-time Mixed H2/H-Infinity Stochastic Control'
        location: /downloads/Papers/h2hinf.pdf
        authors:
          - Leilei Cui and <b>Lekan Molu.</b>
        venue_web: https://arxiv.org
        venue: Arxiv
        paper_status: Accepted
        year: April 2023
        thumbnail: /assets/thumbs/h2hinf.jpg
        abstract: >
          We study robust policy optimization in continuous-time stochastic systems under
          the mixed H2/H-infinity performance criterion. Combining stochastic differential
          equation theory with modern policy gradient methods, we derive convergence rates
          and demonstrate improved robustness to model uncertainty in uncertain dynamical
          systems arising in robotics and medical automation.

  - items: 'LSD'
