        year: Madrid 2018
        paper_status: Accepted
        thumbnail: /assets/thumbs/iros18.jpg
        abstract: >
          We present a minimax iterative dynamic game algorithm for robust nonlinear robot
          control under adversarial perturbations. The method frames the control problem as
          a two-player zero-sum game and computes feedback policies via saddle-point
          iterations on the Hamilton-Jacobi-Isaacs equation, achieving superior robustness
          on a 6-DOF arm tracking task compared to standard optimal control baselines.

