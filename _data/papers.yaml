          We prove that multi-step inverse dynamics models recover controllable latent
          state representations with provable guarantees under a rich-observation MDP
          assumption. The theoretical analysis resolves an open question on when
          self-supervised representation learning methods succeed for downstream control tasks.

  - items: IGL2
    paperitems:
      - title: 'Interaction-Grounded Learning with Action-inclusive Feedback'
        location: https://arxiv.org/abs/2206.08364
        authors:
          - Tengyang Xie, Akanksha Saran, Dylan J Foster, <b>Lekan Molu</b>,
