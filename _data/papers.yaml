  - items: 'SoRoSPT'
    paperitems:
      - title: 'Fast Whole-Body Strain Regulation in Continuum Robots'
        location: 'downloads/Papers/SoRoSPT.pdf'
        authors:
          - <b>Lekan Molu</b>.
        venue_web: 'https://acc2025.a2c2.org/'
        venue: American Control Conference (ACC), Denver, CO
        paper_status: Accepted
        year: June 2025
        thumbnail: /assets/thumbs/sorospt.jpg
        abstract: >
          We present a singularly-perturbed backstepping controller for whole-body strain
          regulation in multi-section continuum robots modeled by discrete Cosserat rods.
          The composite fast-slow design decouples the bending and shear strain dynamics,
          achieving convergence guarantees and superior transient performance compared to
          monolithic control laws.

  - items: 'LevPy'
    paperitems:
      - title: 'The Python LevelSet Toolbox (LevelSetPy)'
        location: 'downloads/Papers/levelsetpy_cdc.pdf'
        authors:
          - <b>Lekan Molu</b>.
        venue_web: 'https://cdc2024.ieeecss.org/'
        venue: Conference on Decision and Control (CDC), Milano, Italia
        paper_status: Accepted
        year: December 2024
        thumbnail: /assets/thumbs/levelsetpy_cdc.jpg
        abstract: >
          This paper introduces LevelSetPy, a Python-native reimplementation of the
          Hamilton-Jacobi reachability toolbox with GPU support via JAX. We demonstrate
          its correctness and efficiency on canonical pursuit-evasion games and
          high-dimensional reachability problems relevant to autonomous systems.

  - items: 'SoRoPD'
    paperitems:
      - title: 'Structural Properties and Control of Soft Robots Modeled with Discrete Cosserat Rods'
        location: 'downloads/Papers/SoRoPD.pdf'
        authors:
          - <b>Lekan Molu</b> and <a href="https://shaoruchen.github.io">Shaoru Chen</a>.
        venue_web: 'https://cdc2024.ieeecss.org/'
        venue: Conference on Decision and Control (CDC), Milano, Italia
        paper_status: Accepted
        year: December 2024
        thumbnail: /assets/thumbs/soropd.jpg
        abstract: >
          We analyze the structural (controllability, observability, and passivity) properties
          of multi-section soft robots modeled by discrete Cosserat rod theory. Exploiting
          these properties, we design an energy-based controller with provable stability
          guarantees and validate it in simulation on a three-section planar manipulator.

  - items: 'VecNN'
    paperitems:
      - title: 'Verification-aided Learning Neural Network Barrier Functions with Termination Guarantees'
        location: 'https://arxiv.org/pdf/2403.07308.pdf'
        authors:
          - <a href="https://shaoruchen.github.io">Shaoru Chen</a>, <b>Lekan Molu</b>, and <a href="https://www.seas.upenn.edu/~mfazlyab/">Mahyar Fazlyab</a>.
