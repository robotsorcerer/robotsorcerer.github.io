          We frame beam orientation optimization (BOO) in radiation therapy as a sequential
          decision problem and train a deep neural network policy using imitation learning
          from a column-generation solver. The learned policy selects coplanar and
          non-coplanar beam configurations that rival expert-optimized plans while running
          in real time.

  - items: 'IROS18!'
    paperitems:
      - title: 'Minimax Iterative Dynamic Game: Application to Nonlinear Robot Control Tasks'
        location: 'downloads/Papers/IROS18.pdf'
        authors:
          - <b>Olalekan Ogunmolu</b>,
          - Nick Gans, and
