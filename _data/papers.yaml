  # ── SUBMITTED (descending year) ──────────────────────────────────────
  - items: 'Neurips-HJReach'
    paperitems:
      - title: 'HJ-Gauss: A Monte-Carlo HJ Reachability Scheme'
        location: downloads/Papers/hjgauss.pdf
        authors:
          - <b>Lekan Molu</b>, Venkatraman Renganathan, and Namhoon Cho.
        venue_web: 'https://neurips.cc/'
        venue: Neural Information Processing Systems (NeurIPS), Paris.
        paper_status: Submitted
        year: 2026
        thumbnail: /assets/thumbs/icml26.jpg
        abstract: >
            Classical Hamilton–Jacobi safety verification breaks under high dimensions because grids explode combinatorially. We sidestep this by quasilinearizing viscous HJI equations through a generalized Cole–Hopf transform, reducing nonlinear safety propagation to Gaussian heat-kernel inference. The result is a scalable, plug-and-play safety wrapper for autonomous systems with provable concentration bounds and linear convergence — trading grid explosion for controllable Monte Carlo sampling.
  - items: 'InfDiff'
    paperitems:
      - title: 'Beyond Sampling: Kolmogorov PDE Regression for Robust Diffusion Policies'
        location:
        authors:
          - <b>Lekan Molu</b>.
        venue_web: 'https://neurips.cc/'
        venue: Neural Information Processing Systems (NeurIPS), Paris.
        paper_status: Submitted
        year: 2026
        thumbnail: #/assets/thumbs/infdiff.jpg
        abstract: >
            Finite-dimensional (FD) diffusion policies are well-known to degrade in performance in long-horizon 
            control prediction settings owing to temporal drift of the backward action trajectory and the spectral
             artifacts associated with the finite grid discretization from which actions are sampled. This hinders 
             their reliable deployment when policies must satisfy all allocated and functional baselines with certifiable 
             robustness guarantees. To address this deficiency, we lift diffusion to an infinite-dimensional subset of a 
             Hilbert Space and transform the Monte-Carlo action sampling generation into a deterministic PDE regression. 
             This reparameterization (i) attenuates the instability associated with Monte Carlo rollouts in FD settings; 
             whilst (ii) enabling reconfigurability of the action space in spectral form to support the entire data manifold;            and (iii) provides dimension-independent convergence guarantees. Specifically, we lift the backward Kolmogorov 
             score function to a Cameron-Martin space, introducing a physics-grounded Kolmogorov residual as a diagnostic during 
             learning. Our schemes are validated on contact-rich manipulation (\texttt{PushT}) and manufacturing constant 
             work-in-processes (\texttt{CONWIP}) flow forecasting. Across action (reverse) denoising steps on \texttt{PushT}, 
             we notice an inter-step drift convergence accuracy of 98% on our infinite-dimensional formulation versus 
             85% on the FD visuomotor policy tasks. In addition, we achieved a 28.4% improvement in forecasting 
             accuracy over LSTM baselines and near-perfect recall in bottleneck event detection for manufacturing \texttt{CONWIP}. 
             To further imbue robustness into diffusion workflows, we integrate our approach with Hamilton–Jacobi reachability 
             safety analysis, so that our approach yields certified safe policies that reduce deadlocks by 96% in stochastic 
             factory automation discrete event systems.

  - items: 'CDC26'
    paperitems:
      - title: 'Infinite-Dimensional Visuomotor Diffusion Policies from SDE Parameterization'
        location:
        authors:
          - <b>Lekan Molu</b>.
        venue_web:
        venue: 65th Conference on Decision and Control, Honolulu, Hawaii
        paper_status: Submitted
        year: 2026
        thumbnail: /assets/thumbs/lcss26.jpg
        abstract: >
          Diffusion policies are very consequential in learning the visuomotor policies of many autonomous
          systems. Despite the underlying diffusion process' existence in an infinite-dimensional (ID) function
          space, practical autonomous systems implementations discretize diffused control trajectories within
          finite-dimensional (FD) vector spaces. We set diffusion visuomotor policies in the natural ID fabric
          of the problems they attempt to solve, approximating controls ideally with all potential solutions
          within the function space, including their relative probabilities, while precisely deferring
          discretization as long as possible. We show that the Backward Kolmogorov Equation (BKE) in a Hilbert
          space turns stochastic diffusion score regression into deterministic PDE regression with a
          Cameron-Martin (CM) loss that achieves a dimension-independent total-variation bound on the underlying
          probability distribution.

  - items: GNEP-Socio
    paperitems:
      - title: 'A Generalized Nash Equilibrium-Seeking Scheme for Trauma Resuscitation'
        location: 'downloads/Papers/IFAC26.pdf'
        authors:
          - Promise Ekpo, <a href="https://www.angeliquemtaylor.com/">Angelique Taylor</a>, and <b>Lekan Molu</b>.
        venue_web: 'https://www.ifac-control.org/conferences/ifac-world-congress-23rd-wc-2026tm'
        venue: International Federation of Automatic Control, World Congress 2026
        paper_status: Accepted
        year: August 2026
        thumbnail: /assets/thumbs/gnep_socio.jpg
        abstract: >
          We transform emergency room trauma resuscitation into a multi-agent control problem and propose a
          generalized Nash equilibrium-seeking policy that coordinates multiple clinical agents
          under resource constraints, improving patient outcomes while satisfying safety and
          fairness requirements.

  - items: 'CFree!'
    paperitems:
      - title: 'A Fast Universal Collision-free Agentic Model: Compact Illusory Representation and Memory-Efficient Incremental Mapping'
        authors:
          - <b>Lekan Molu</b>, Abulikemu Abuduweili, Dean Fortier, Jun Takamatsu, Elise van der Pol, Naoki Wake, and Katsu Ikeuchi
        location: #downloads/Papers/CFree.pdf
        venue: Science Robotics
        paper_status: Submitted
        year: April 2025
        thumbnail: /assets/thumbs/cfree.jpg
        abstract: >
          We present a universal collision-free planner for open-embodiment robots that
          combines compact implicit scene representations with memory-efficient incremental
          occupancy mapping. The method generalizes across robot morphologies without
          retraining and achieves real-time planning in cluttered, partially observed environments.

