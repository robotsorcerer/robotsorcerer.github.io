  - items: 'Robodiff'
    sortdate: 2026-05-24
    subnewsitems:
      - content: 'For long-horizon planning tasks, finite-dimensional diffusion policies wack. Well, this <a href="/downloads/Papers/robodiff.pdf" target="_blank">infinite-dimensional policy</a> smacks! 🏭 My 👉 <a href="/downloads/Papers/robodiff.pdf" target="_blank">recent work</a> moves beyond point-based sampling/estimates in diffusion to <b>function-space diffusion + formal control verification</b>, delivering a principled framework for high-stakes robots-enabled production control systems. Results? 🎯 Improved convergence in robot manipulation tasks. There''s more: in  supply chain manufacturing, certifiable bottleneck predictions and the reliable dispatch optimization of utilization efficacy also leveled up: <a href="https://doi.org/10.1080/00207543.2021.1954713" target="_blank">CONWIP</a> with certified safety under prediction uncertainty 💪 • 🔍  🚀<a href="https://onlinelibrary.wiley.com/doi/book/10.1002/9781119453765" target="_blank">Bottleneck detection with theoretical grounding</a> • 📈 Smooth dispatch policies ✅ for resilient, efficient supply chains.🏆 Some good Samaritan''s AI agent made a  neat summary <a href="https://gist.science/paper/2606.18186" target="_blank">here.</a>🎤⬇️'
        summary: 'Today’s diffusion-based robot policies tend to drift on long tasks. My new approach keeps them mathematically grounded — for more reliable long-horizon planning. <a href="/downloads/Papers/robodiff.pdf" target="_blank">Read the paper.</a>'
        highlight: true
        date: 'May 24, 2026'
  - items: 'HJGauss_NeurIPS26'
    sortdate: 2026-05-29
    subnewsitems:
      - content: '🎯 Move over <a href="/downloads/Papers/levelsetpy.pdf" target="_blank" style="color: #4FC3F7; font-weight: 600;">grid-resolved Hamilton–Jacobi (HJ) backward reachable sets/tubes (BRS/BRTs)</a>: With a Cole-Hopf-type transformation of the viscous HJ IVP, turns out Feynman-Kac''s formula may recover BRTs as a quasilinearized Gaussian-kernel density representation. <a href="/downloads/Papers/hjgauss.pdf" target="_blank" style="color: #4FC3F7; font-weight: 600;">In a Picard iterative scheme</a>, we find that 🛡️☠️➡️✨ combinatorial grid explosion reduces to linear Monte-Carlo sampling. Results?😏 ✅ 📊 dimension-independent convergence • 💾 worry-free, memoryless optimization compared to <a href="https://github.com/robotsorcerer/levelsetpy" target="_blank" style="color: #4FC3F7; font-weight: 600;">levelsets</a> classical compute baselines • 🔓 tight L²/Hausdorff error bounds from levelset methods• 🤖 and efficacy on benchmarks previously considered computationally intractable 👉➡️ up to <b>100,000 European starlings</b> <i>(sturnus vulgaris)</i> in multi-predator (peregrine falcon) games --- on commodity multicore CPUs --- inspired by recorded murmurations over Rome, Italy. Solves for phase transitions under <b>vacuole nucleation, cordon formation detection, and flocks splitting</b>🌍. 🧠⚡ TL;DR: we may now teach fleets of autonomous robots/cars not just <i>what to do</i>, but <i>where danger geometrically lives</i>. 🌌🏭 <a href="/downloads/Papers/hjgauss.pdf" target="_blank" style="color: #4FC3F7; font-weight: 600;">HJ-Gauss</a> opens the door to scalable, certifiably trustworthy embodied AI safety verification. 🧑‍💻 The full codebase is live and open-source at <a href="https://github.com/robotsorcerer/levelsetpy" target="_blank" style="color: #4FC3F7; font-weight: 600;">github.com/robotsorcerer/levelsetpy</a> --- clone it and certify your own swarms! <b>Scalability über alles!</b>🎩👌🤯'
        summary: 'A faster, provably-safe way to verify autonomous systems — light enough to run on an ordinary computer. We put it to the test on 100,000 starlings dodging predator falcons. <a href="/downloads/Papers/hjgauss.pdf" target="_blank">Read the paper</a> · <a href="https://github.com/robotsorcerer/levelsetpy" target="_blank">code</a>.'
        highlight: true
        date: May 29, 2026
  - items: 'IFAC_GNEP'
    sortdate: 2026-04-16
    subnewsitems:
      - content: >
          🚨 Game theory has officially met ER practice 🏥 + 🎮 = ❤️🚀 What if trauma resuscitation teams could coordinate efforts better
          like a well-oiled machine? Perhaps, healthcare workers' workflows may become: ✅ fairer (balanced workloads ⚖️) ✅ smarter (skill-task alignment 🧠)
          and ✅ efficient with (rapid, stable decisions ⚡) 🎯 Our <a href="/downloads/Papers/IFAC26.pdf" target="_blank">latest work</a>
          addresses these in a <b>distributed generalized Nash equilibrium (GNE)-seeking</b> mechanism, grounded in real clinical
          workflows at <b>Weill Cornell Medicine</b>. The result? A principled framework for orchestrating high-stakes team dynamics
          under time pressure, resource constraints, and diverse expertise — delivering the best possible outcomes in real time. 🏆🌍🚀
          Now headed to <a href="https://www.ifac-control.org/conferences/ifac-world-congress-23rd-wc-2026tm" target="_blank">IFAC
          World Congress!</a> 🎉
        summary: 'A framework to help ER trauma teams make fast, fair decisions under pressure — built with Weill Cornell Medicine. Accepted to the IFAC World Congress 2026. <a href="/downloads/Papers/IFAC26.pdf" target="_blank">Read the paper.</a>'
        highlight: true
        date: April 16, 2026

