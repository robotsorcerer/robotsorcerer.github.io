<footer class="site-footer">
  <div class="wrap">
    <div class="footer-inner">

      <div class="footer-col">
        <ul>
          {% if site.github_username %}
          <li>
            <a href="https://github.com/{{ site.github_username }}" target="_blank">
              <i class="fa fa-github fa-fw"></i> GitHub
            </a>
          </li>
          {% endif %}
          <li>
            <a href="https://www.linkedin.com/in/robotsorcerer" target="_blank">
              <i class="fa fa-linkedin fa-fw"></i> LinkedIn
            </a>
          </li>
        </ul>
      </div>

      <div class="footer-col">
        <ul>
          {% if site.email %}
          <li>
            <a href="mailto:{{ site.email }}">
              <i class="fa fa-envelope-o fa-fw"></i> {{ site.email }}
            </a>
          </li>
          {% endif %}
          <li>
            <a href="https://hub.docker.com/u/{{ site.docker_username }}" target="_blank">
              <i class="fa fa-cube fa-fw"></i> Docker Hub
            </a>
          </li>
        </ul>
      </div>

      <div class="footer-col footer-col--right">
          {% if site.quora_username %}
          <li>
            <a href="https://www.quora.com/{{ site.quora_username }}" target="_blank">
              <i class="fa fa-quora fa-fw"></i> Quora
            </a>
          </li>
          {% endif %}
        <p style="margin-top:8px;font-size:.75rem;">
          <a href="{{ "/atom.xml" | prepend: site.baseurl }}">
            <img src="/downloads/rssicon.svg" width="14" style="vertical-align:middle;margin-right:4px;">RSS Feed
          </a>
        </p>
      </div>

    </div><!-- /.footer-inner -->
  </div><!-- /.wrap -->
</footer>

<script async defer id="github-bjs" src="https://buttons.github.io/buttons.js"></script>
